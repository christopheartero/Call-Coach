const STORAGE_KEY = "callcoach_v1";

// ─── STORAGE (localStorage) ────────────────────────────────────────────────
function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
}
function saveEntry(entry) {
  try {
    const all = loadAll();
    all.unshift(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    return all;
  } catch { return []; }
}
function deleteEntry(id) {
  try {
    const filtered = loadAll().filter(a => a.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
    return filtered;
  } catch { return []; }
}

  {id:"offre_adaptee",label:"Offre differente / adaptee"},
  {id:"objections_passe",label:"Objections liees au passe"},
  {id:"closing_next_steps",label:"Closing & Next Steps"},
];
const WEIGHTS_RNW = {objections:0.30,closing:0.25,valeur:0.20,decouverte:0.15,posture:0.10};
const WEIGHTS_AM  = {detection_risques:0.30,diagnostic_business:0.25,creation_valeur:0.20,decouverte:0.15,preparation_renouvellement:0.10};
const WEIGHTS_NB  = {qualification:0.20,decouverte_besoins:0.25,pitch:0.20,objections:0.20,next_steps_urgence:0.15};
const WEIGHTS_WB  = {diagnostic_depart:0.25,gestion_passe:0.20,offre_adaptee:0.15,objections_passe:0.25,closing_next_steps:0.15};

function weightedScore(scores, type) {
  const weights = type==="suivi"?WEIGHTS_AM:type==="nb"?WEIGHTS_NB:type==="winback"?WEIGHTS_WB:WEIGHTS_RNW;
  let total=0,wSum=0;
  Object.entries(scores).forEach(([k,v])=>{const w=weights[k]||0;total+=(v.note||0)*w;wSum+=w;});
  return wSum>0?Math.round(total/wSum):0;
}

  ${scoresHTML?section("Scores","#2563eb",scoresHTML):""}
  ${refsHTML?section("Reformulations","#7c3aed",refsHTML):""}
  ${coachHTML?section("Top 3 coaching","#b45309",coachHTML+(r.a_surveiller?`<div style="margin-top:12px;padding:10px 14px;background:#fffbeb;border-radius:8px;font-size:12px;color:#92400e"><strong>A surveiller :</strong> ${r.a_surveiller}</div>`:"")):""}
  ${oppsHTML?section("Opportunites manquees","#ea580c",oppsHTML):""}
  ${r.verdict?section("Verdict","#0f766e",`<div style="font-size:14px;line-height:1.8;color:#333;font-style:italic">${r.verdict}</div>`):""}
</div></body></html>`;
}

// ─── UI COMPONENTS ─────────────────────────────────────────────────────────
function Card({children, left, style={}}) {
  return <div style={{background:"#0f0f1a",border:"1px solid #1a1a2a",borderRadius:12,padding:"16px 20px",borderLeft:left?"3px solid "+left:undefined,...style}}>{children}</div>;
}
function SL({c="#6b6b7e",children}) {
  return <div style={ss({fontSize:10,textTransform:"uppercase",letterSpacing:2,color:c,marginBottom:8})}>{children}</div>;
}
function Tab({active,onClick,children}) {
  return <button onClick={onClick} style={{background:"none",border:"none",borderBottom:active?"2px solid #8b7355":"2px solid transparent",padding:"9px 13px",color:active?"#e8e4dc":"#6b6b7e",fontFamily:"system-ui,sans-serif",fontSize:12,marginBottom:-1,cursor:"pointer"}}>{children}</button>;
}

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:28}}>
              {amStats.map(stat=>(
                <button key={stat.name} onClick={()=>{setPatAM(stat.name);setPatData(null);if(stat.count>=2)genPatterns(stat.name);}}
                  style={{background:patAM===stat.name?"#1a1208":"#0f0f1a",border:"1px solid",borderColor:patAM===stat.name?"#8b7355":"#1a1a2a",borderRadius:12,padding:"14px 16px",textAlign:"left",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={ss({fontSize:14,fontWeight:600,color:"#e8e4dc"})}>{stat.name}</span>
                    <span style={pf({fontSize:16,fontWeight:700,color:sc(stat.avg)})}>{stat.avg}</span>
                  </div>
                  <div style={ss({fontSize:11,color:"#6b6b7e"})}>{stat.count} call{stat.count>1?"s":""}</div>
                  {stat.count<2&&<div style={ss({fontSize:10,color:"#4a4a5e",marginTop:4})}>+1 call pour patterns</div>}
                </button>
              ))}
            </div>
            {patAM&&(
              <div>
                <div style={ss({fontSize:11,color:"#8b7355",textTransform:"uppercase",letterSpacing:2,marginBottom:16})}>{patAM}</div>
                {patLoading&&<div style={{display:"flex",alignItems:"center",gap:12,padding:"20px",background:"#0f0f1a",borderRadius:12,border:"1px solid #1a1a2a"}}><span className="pu" style={{color:"#8b7355"}}>◎</span><div style={ss({fontSize:13,color:"#6b6b7e"})}>Analyse des patterns en cours...</div></div>}
                {!patLoading&&patData&&!patData.error&&(
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <Card left="#8b7355"><SL c="#8b7355">Profil global</SL><div style={ss({fontSize:13,lineHeight:1.7,color:"#c8c4bc"})}>{patData.synthese}</div></Card>
                    {patData.points_forts_recurrents&&<Card left="#4ade80"><SL c="#4ade80">Points forts recurrents</SL>{patData.points_forts_recurrents.map((p,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:i<patData.points_forts_recurrents.length-1?8:0}}><span style={{color:"#4ade80",fontSize:8,marginTop:4}}>●</span><div style={ss({fontSize:13,lineHeight:1.6,color:"#b8b4ac"})}>{p}</div></div>)}</Card>}
                    {patData.axes_faibles_recurrents&&<Card left="#f87171"><SL c="#f87171">Axes faibles recurrents</SL>{patData.axes_faibles_recurrents.map((p,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:i<patData.axes_faibles_recurrents.length-1?8:0}}><span style={{color:"#f87171",fontSize:8,marginTop:4}}>●</span><div style={ss({fontSize:13,lineHeight:1.6,color:"#b8b4ac"})}>{p}</div></div>)}</Card>}
                    <Card left="#facc15"><SL c="#facc15">Evolution</SL><div style={ss({fontSize:13,lineHeight:1.7,color:"#c8c4bc"})}>{patData.evolution}</div></Card>
                    {patData.focus_coaching&&<Card left="#a78bfa"><SL c="#a78bfa">Focus coaching (prochaines semaines)</SL>{patData.focus_coaching.map((p,i)=><div key={i} style={{display:"flex",gap:12,marginBottom:i<patData.focus_coaching.length-1?8:0}}><div style={pf({color:"#a78bfa",fontWeight:700,fontSize:14,minWidth:18})}>{i+1}</div><div style={ss({fontSize:13,lineHeight:1.6,color:"#c8c4bc"})}>{p}</div></div>)}</Card>}
                    <Card left="#8b7355"><SL c="#8b7355">Message manager</SL><div style={pf({fontSize:14,lineHeight:1.8,color:"#e8e4dc",fontStyle:"italic"})}>"{patData.message_manager}"</div></Card>
                  </div>
                )}
                {!patLoading&&patData?.error&&<div style={ss({color:"#f87171",fontSize:13})}>{patData.error}</div>}
                {!patLoading&&!patData&&analyses.filter(a=>a.am===patAM).length<2&&(
                  <div style={ss({color:"#4a4a5e",fontSize:13,padding:"20px",background:"#0f0f1a",borderRadius:12,border:"1px solid #1a1a2a"})}>Minimum 2 calls necessaires pour analyser les patterns de {patAM}.</div>
                )}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
